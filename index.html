<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deployment Roadmap Builder</title>
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,500;0,6..96,700;1,6..96,400&family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
</head>
<body data-theme="gradient">

  <!-- Auth bar (visible only when Supabase is configured) -->
  <div class="auth-bar" id="auth-bar"></div>

  <!-- Top bar -->
  <div class="top-bar" id="roadmap-bar">
    <img id="top-bar-logo" src="/deployment-roadmap-builder/logo-black.svg" alt="Certinia" class="top-bar-logo" />
    <div class="top-bar-divider"></div>
    <input type="text" id="roadmap-name" class="roadmap-name-input" placeholder="Customer / roadmap name" />
    <select id="roadmap-select" onchange="handleRoadmapSelect(event)" style="display:none">
      <option value="">— New roadmap —</option>
    </select>
    <div class="top-bar-spacer"></div>
    <span id="save-status" style="display:none"></span>
    <button onclick="exportStateAsJson()" class="btn-ghost">⬇ Export JSON</button>
    <label class="btn-ghost" style="cursor:pointer">
      ⬆ Import JSON
      <input type="file" accept=".json" onchange="handleJsonImport(event)" style="display:none" />
    </label>
    <button onclick="newRoadmap()">New</button>
    <button id="save-btn" onclick="saveRoadmap()" class="primary">Save</button>
    <button id="theme-toggle-btn" onclick="toggleTheme()" title="Switch theme" style="padding:5px 8px;font-size:14px;line-height:1">☀︎</button>
  </div>

  <!-- Stats bar -->
  <div class="stats-bar" id="stats-bar"></div>

  <!-- Main toolbar -->
  <div class="toolbar">
    <button class="primary" onclick="openAddFeature()">+ Add feature</button>
    <button onclick="openAddWorkstream()">+ Add workstream</button>
    <select id="filterWs" onchange="render()">
      <option value="">All workstreams</option>
    </select>
    <select id="filterStatus" onchange="render()">
      <option value="">All statuses</option>
    </select>
    <div style="flex:1"></div>
    <button id="density-btn" onclick="toggleDensity()">Compact</button>
    <button onclick="exportToPptx()">⬇ Export .pptx</button>
    <button id="btn-google-slides" onclick="exportToGoogleSlides()">Export to Google Slides ↗</button>
  </div>

  <!-- Legend -->
  <div class="legend" id="legend"></div>

  <!-- Release band header (aligned with vis-timeline label panel + month columns) -->
  <div class="gantt-wrap">
    <div class="gantt-release-header" id="release-header"></div>
    <div id="gantt"></div>
  </div>

  <!-- Feature modal -->
  <div class="modal-bg" id="modal-bg">
    <div class="modal">
      <h3 id="modal-title">Add feature</h3>
      <div class="form-row">
        <label>Feature name</label>
        <input type="text" id="f-name" placeholder="Feature name" />
      </div>
      <div class="form-row">
        <label>Workstream</label>
        <select id="f-ws"></select>
      </div>
      <div class="form-row">
        <label>Status</label>
        <select id="f-status"></select>
      </div>
      <div class="form-row">
        <label>Start month</label>
        <div class="month-grid" id="start-months"></div>
      </div>
      <div class="form-row">
        <label>End month</label>
        <div class="month-grid" id="end-months"></div>
      </div>
      <div class="modal-actions">
        <button id="delete-btn" class="danger" style="margin-right:auto;display:none" onclick="deleteFeature()">Delete</button>
        <button onclick="closeModal()">Cancel</button>
        <button class="save" onclick="saveFeature()">Save</button>
      </div>
    </div>
  </div>

  <!-- Workstream modal -->
  <div class="modal-bg" id="ws-modal-bg">
    <div class="modal">
      <h3 id="ws-modal-title">Add workstream</h3>
      <div class="form-row">
        <label>Workstream name</label>
        <input type="text" id="ws-name-input" placeholder="e.g. Analytics" />
      </div>
      <div class="form-row">
        <label>Color</label>
        <input type="color" id="ws-color-input" value="#4A6FA5" style="width:100%;height:36px;padding:2px 4px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);cursor:pointer" />
      </div>
      <div class="modal-actions">
        <button id="ws-delete-btn" class="danger" style="margin-right:auto;display:none" onclick="deleteWorkstream()">Delete workstream</button>
        <button onclick="document.getElementById('ws-modal-bg').classList.remove('open')">Cancel</button>
        <button class="save" onclick="saveWorkstream()">Save</button>
      </div>
    </div>
  </div>

  <!-- Setup wizard -->
  <div class="modal-bg" id="wizard-modal-bg">
    <div class="modal" style="width:480px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <h3 id="wizard-title" style="margin:0">Welcome</h3>
        <span id="wizard-step-indicator" style="font-size:11px;color:var(--color-text-tertiary)">Step 1 of 3</span>
      </div>
      <div id="wizard-content"></div>
      <div class="modal-actions" style="margin-top:18px">
        <button onclick="wizardSkip()" style="margin-right:auto;color:var(--color-text-tertiary);border-color:transparent;background:transparent">Skip</button>
        <button id="wizard-back-btn" style="display:none" onclick="wizardBack()">← Back</button>
        <button class="save" id="wizard-next-btn" onclick="wizardNext()">Next →</button>
      </div>
    </div>
  </div>

  <!-- New Roadmap confirmation modal -->
  <div class="modal-bg" id="new-roadmap-modal-bg">
    <div class="modal" style="width:320px">
      <h3>Start new roadmap?</h3>
      <p style="font-size:12px;color:var(--color-text-secondary);margin:0 0 16px">Any unsaved changes will be lost.</p>
      <div class="modal-actions">
        <button onclick="closeNewRoadmapModal()">Cancel</button>
        <button class="danger" onclick="confirmNewRoadmap()">Start new</button>
      </div>
    </div>
  </div>

  <!-- Sign-in modal -->
  <div class="modal-bg" id="signin-modal-bg">
    <div class="modal">
      <h3>Sign in</h3>
      <p style="font-size:12px;color:var(--color-text-secondary);margin-bottom:14px">
        Enter your email address to receive a sign-in link.
      </p>
      <div class="form-row">
        <label>Email address</label>
        <input type="email" id="signin-email" placeholder="you@example.com" />
      </div>
      <div id="signin-message" style="display:none;font-size:12px;padding:8px;border-radius:var(--border-radius-md);margin-bottom:10px"></div>
      <div class="modal-actions">
        <button onclick="closeSignInModal()">Cancel</button>
        <button class="save" id="signin-submit-btn" onclick="submitSignIn()">Send link</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
